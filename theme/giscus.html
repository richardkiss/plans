<!--
  Reference giscus snippet (the live include is theme/giscus.js, loaded by
  every book via output.html.additional-js in its book.toml).

  This file documents the canonical <script> tag with the PLACEHOLDER values
  that must be replaced. Get the real ids from https://giscus.app after
  enabling Discussions on richardkiss/plans and installing the giscus app —
  then update theme/giscus.js. Full steps in README.md.
-->
<script src="https://giscus.app/client.js"
        data-repo="richardkiss/plans"
        data-repo-id="PLACEHOLDER_REPO_ID"
        data-category="Announcements"
        data-category-id="PLACEHOLDER_CATEGORY_ID"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>
